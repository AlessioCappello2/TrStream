version: "3.9"

networks:
  app-tier:
    driver: bridge

services:
  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: kafka
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    networks:
      - app-tier
    healthcheck:
      test: ["CMD", "/opt/bitnami/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 5s
      retries: 12
      start_period: 10s
      timeout: 5s

  kafka-config:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: kafka-config
    depends_on:
      - kafka
    volumes:
      - ./scripts/scripts-config:/scripts
    entrypoint:
      ["/bin/bash", "/scripts/create-topics.sh", "kafka:9092", "3600000", "transactions-faker", "transactions-stripe", "transactions-revolut"]
    networks:
      - app-tier
    restart:
      no

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - 8080:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - app-tier

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ./minio/data:/data
    env_file:
      - ./config/env/services/minio.env
    networks:
      - app-tier

  minio-config:
    image: python:3.10-slim
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./config/env/services/minio.env
    networks:
      - app-tier
    volumes:
      - ./scripts/scripts-config:/scripts
    command: >
      sh -c "pip install --no-cache-dir boto3==1.40.50 && python /scripts/create_buckets.py"

  producer:
    build:
      context: .
      dockerfile: ./config/docker/services/Dockerfile.producer
    image: trstream-producer:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kafka-config:
        condition: service_completed_successfully
    env_file:
      - ./config/env/services/producer.env
    networks:
      - app-tier

  consumer:
    build:
      context: .
      dockerfile: ./config/docker/services/Dockerfile.consumer
    image: trstream-consumer:latest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka-config:
        condition: service_completed_successfully
      minio-config:
        condition: service_completed_successfully
    env_file:
      - ./config/env/services/consumer.env
    networks:
      - app-tier

  processor:
    build:
      context: .
      dockerfile: ./config/docker/services/Dockerfile.processor
    image: trstream-processor:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./config/env/services/processor.env
    networks:
      - app-tier

  compacter:
    build:
      context: .
      dockerfile: ./config/docker/services/Dockerfile.compacter
    image: trstream-compacter:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./config/env/services/compacter.env
    networks:
      - app-tier  

  querier:
    build:
      context: .
      dockerfile: ./config/docker/services/Dockerfile.querier
    image: trstream-querier:latest
    container_name: querier
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./config/env/services/querier.env
    ports:
      - "8000:8000"
    networks:
      - app-tier  

  editor:
    build:
      context: .
      dockerfile: ./config/docker/services/Dockerfile.editor
    image: trstream-editor:latest
    container_name: editor
    env_file:
      - ./config/env/services/editor.env
    ports:
      - "8501:8501"
    depends_on:
      - querier
    networks:
      - app-tier

  ##########################
  # INTEGRATIONS
  ##########################
  stripe-webhook:
    build:
      context: .
      dockerfile: ./config/docker/integrations/stripe/Dockerfile.webhook
    image: trstream-stripe-webhook:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    env_file:
      - ./config/env/integrations/stripe/webhook.env
    networks:
      - app-tier

  stripe-generator:
    build:
      context: .
      dockerfile: ./config/docker/integrations/stripe/Dockerfile.generator
    image: trstream-stripe-generator:latest
    depends_on:
      stripe-webhook:
        condition: service_healthy
    env_file: 
      - ./config/env/integrations/stripe/generator.env
    networks:
      - app-tier

  revolut-setup:
    build: 
      context: .
      dockerfile: ./config/docker/integrations/revolut/Dockerfile.setup
    image: trstream-revolut-setup:latest
    env_file:
      - ./config/env/integrations/revolut/setup.env
    stdin_open: true
    tty: true

  revolut-generator:
    build:
      context: .
      dockerfile: ./config/docker/integrations/revolut/Dockerfile.generator
    image: trstream-revolut-generator:latest
    env_file:
      - ./config/env/integrations/revolut/generator.env

  revolut-worker:
    build:
      context: .
      dockerfile: ./config/docker/integrations/revolut/Dockerfile.worker
    image: trstream-revolut-worker:latest
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ./config/env/integrations/revolut/worker.env
    networks:
      - app-tier